<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carte des Centres – AmalCare</title>
  <meta name="description" content="Carte interactive des centres d'oncologie au Maroc. Localisez les centres publics et privés." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="./css/style.css" />

  <style>
    /* Make map fill correctly */
    html, body { height: 100%; overflow: hidden; }
    .map-layout { height: calc(100vh - 64px); }
    @media (max-width: 768px) {
      html, body { overflow: auto; }
      .map-layout { height: auto; }
      #map { height: 60vh; min-height: 400px; }
    }
  </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay">
  <div class="spinner"></div>
  <span class="loading-text">Chargement de la carte...</span>
</div>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">🏥</div>
      <span>AmalCare</span>
    </a>
    <ul class="navbar-nav" role="navigation">
      <li><a href="index.html" data-i18n="nav.home">Accueil</a></li>
      <li><a href="centres.html" data-i18n="nav.centres">Centres</a></li>
      <li><a href="associations.html" data-i18n="nav.associations">Associations</a></li>
      <li><a href="map-centres.html" class="active" data-i18n="nav.map-centres">Carte Centres</a></li>
      <li><a href="index.html#assurance" data-i18n="nav.assurance">Assurance</a></li>
      <li><a href="index.html#guide" data-i18n="nav.guide">Guide</a></li>
    </ul>
    <div class="navbar-actions">
      <div class="lang-toggle" role="group" aria-label="Langue">
        <button class="lang-btn active" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="ar">AR</button>
      </div>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<!-- ── Map Layout ── -->
<div class="map-layout">

  <!-- Sidebar -->
  <aside class="map-sidebar">
    <div class="map-sidebar-header">
      <h2>🏥 Centres d'oncologie</h2>
      <div class="map-sidebar-search">
        <span class="search-icon">🔍</span>
        <input type="search" id="sidebarSearch" placeholder="Rechercher..." autocomplete="off" />
      </div>
      <p id="mapInfo" style="font-size:.78rem;color:var(--text-muted);margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);">Chargement...</p>
    </div>
    <div class="map-sidebar-list" id="centresList"></div>

    <!-- Legend -->
    <div style="padding:.75rem;border-top:1px solid var(--border);">
      <div class="map-legend" style="border:none;box-shadow:none;padding:0;">
        <div class="legend-item">
          <div class="legend-dot" style="background:#1d4ed8;"></div>
          <span style="font-size:.8rem;">Centre public</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#059669;"></div>
          <span style="font-size:.8rem;">Centre privé</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#ef4444;"></div>
          <span style="font-size:.8rem;">Votre position</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Map Container -->
  <div style="position:relative;flex:1;">
    <div id="map"></div>

    <!-- Map Controls -->
    <div class="map-controls">
      <button class="map-btn" id="locateBtn" title="Me localiser">
        📍 Ma position
      </button>
      <button class="map-btn" id="resetBtn" title="Réinitialiser la vue">
        🔄 Réinitialiser
      </button>
      <a href="map-associations.html" class="map-btn" style="justify-content:center;">
        🤝 Associations
      </a>
    </div>
  </div>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="./js/main.js"></script>
<script src="./js/map-centres.js"></script>

<script>
  // Pre-select centre from URL params (IDs are strings like "INO-001")
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    if (id) {
      setTimeout(() => {
        const items = document.querySelectorAll('.map-list-item');
        items.forEach(item => {
          if (item.dataset.id === id) item.click();
        });
      }, 1400);
    }
  });
</script>
</body>
</html>
